name: CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: override release tag
        required: false
  push:
    branches:
      - main
      - alpha

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: lislon
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  test-and-publish:
    name: Test, Build and Publish
    if: github.repository_owner == 'lislon'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0
      - name: Setup Tools
        uses: tanstack/config/.github/setup@main
      - name: Generate Prisma files for backend-core
        run: pnpm run prisma:generate
      - name: Run Tests
        run: pnpm run test:ci --parallel=3

      # Alpha releases with @alpha tag (direct publish, no PR)
      - name: Create snapshot changeset if none exists (alpha)
        if: github.ref == 'refs/heads/alpha'
        run: |
          if [ ! "$(ls -A .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "No changeset found, creating one..."
            cat > .changeset/snapshot-release.md << 'EOF'
          ---
          "@env-hopper/backend-core": patch
          "@env-hopper/frontend-core": patch
          "@env-hopper/shared-core": patch
          "@env-hopper/table-sync": patch
          "@env-hopper/frontend-build-vite": patch
          ---

          Snapshot release from alpha branch
          EOF
          fi
      - name: Version packages (alpha snapshot)
        if: github.ref == 'refs/heads/alpha'
        run: pnpm changeset version --snapshot alpha
      - name: Update lockfile (alpha)
        if: github.ref == 'refs/heads/alpha'
        run: pnpm install --no-frozen-lockfile
      - name: Build packages (alpha)
        if: github.ref == 'refs/heads/alpha'
        run: pnpm run build:all
      - name: Publish to @alpha tag
        if: github.ref == 'refs/heads/alpha'
        run: pnpm changeset publish --tag alpha --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Commit version changes (alpha)
        if: github.ref == 'refs/heads/alpha'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --staged --quiet || git commit -m "chore: snapshot release [skip ci]"
          git push

      # Stable releases for main branch
      - name: Run Changesets (main)
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1.5.3
        with:
          version: pnpm run changeset:version
          publish: pnpm run changeset:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

